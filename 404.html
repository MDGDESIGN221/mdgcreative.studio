<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — MDG Creative Studio</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #060606;
      --dark:   #0e0e0e;
      --light:  #f0ede8;
      --off:    #aca7a2;
      --dim:    #7a7a75;
      --accent: #c8fa64;
      --border: rgba(255,255,255,.07);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--light);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: .03;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,250,100,.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(6,6,6,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: .95rem;
      color: var(--light);
      text-decoration: none;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .label {
      font-family: 'Syne', sans-serif;
      font-size: .58rem;
      font-weight: 800;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .label::before, .label::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: .5;
    }

    .num {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(6rem, 22vw, 14rem);
      line-height: .85;
      letter-spacing: -.04em;
      color: var(--light);
      opacity: .06;
      user-select: none;
      position: absolute;
      pointer-events: none;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      letter-spacing: -.03em;
      line-height: 1.1;
      color: var(--light);
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    p {
      font-size: clamp(.85rem, 2vw, 1rem);
      color: var(--off);
      font-weight: 300;
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .cta-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #000;
      background: var(--accent);
      border: none;
      border-radius: 100px;
      padding: .85rem 1.75rem;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 24px rgba(200,250,100,.3);
    }

    .btn-primary:hover {
      opacity: .88;
      transform: scale(1.03);
    }

    .btn-secondary {
      font-family: 'Syne', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--off);
      background: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 100px;
      padding: .85rem 1.5rem;
      text-decoration: none;
      transition: color .2s, border-color .2s;
    }

    .btn-secondary:hover {
      color: var(--light);
      border-color: rgba(255,255,255,.3);
    }

    @media (max-width: 600px) {
      nav { padding: .85rem 1.25rem; }
      .btn-primary, .btn-secondary {
        width: 100%;
        text-align: center;
      }
      .cta-row { flex-direction: column; width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">MDG Creative Studio</a>
  </nav>

  <main>
    <span class="num">404</span>
    <div class="label">Page introuvable</div>
    <h1>Tu t'es perdu<br>dans l'univers.</h1>
    <p>Cette page n'existe pas ou a été déplacée. Retourne à l'accueil et reprends depuis le début.</p>
    <div class="cta-row">
      <a href="/" class="btn-primary">Retour à l'accueil →</a>
      <a href="https://wa.me/221763772208" target="_blank" rel="noopener noreferrer" class="btn-secondary">WhatsApp</a>
    </div>
  </main>

</body>
</html>
