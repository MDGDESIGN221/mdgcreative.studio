<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — MDG Creative Studio</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#060606">
<meta name="color-scheme" content="dark">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:#060606;color:#f0ede8;
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:2rem;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;
  }
  .glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:60vw;height:60vw;max-width:640px;max-height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(61,191,163,.08),transparent 70%);pointer-events:none}
  .eyebrow{display:flex;align-items:center;gap:12px;justify-content:center;
    font-family:'Syne',sans-serif;font-weight:700;font-size:.66rem;letter-spacing:.3em;
    text-transform:uppercase;color:#3DBFA3;margin-bottom:1.6rem;position:relative}
  .eyebrow::before,.eyebrow::after{content:'';width:26px;height:1px;background:#3DBFA3}
  .code{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(5rem,20vw,11rem);
    line-height:.9;letter-spacing:-.04em;color:#f5f2ec;position:relative}
  .code em{font-family:'DM Serif Display',serif;font-style:italic;font-weight:400;color:#3DBFA3}
  h1{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.2rem,4vw,1.7rem);
    letter-spacing:-.02em;margin:1.2rem 0 .8rem;color:#f0ede8;position:relative}
  p{color:#8f8b84;font-weight:300;font-size:.95rem;line-height:1.7;max-width:42ch;
    margin:0 auto 2.4rem;position:relative}
  .actions{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;position:relative}
  a.btn{display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;
    font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.02em;
    padding:.95rem 1.6rem;border-radius:3px;transition:transform .2s,background .2s,border-color .2s}
  a.btn:hover{transform:translateY(-2px)}
  .btn-p{background:#3DBFA3;color:#04120f}
  .btn-p:hover{background:#5fd6bd}
  .btn-s{background:transparent;color:#f0ede8;border:1px solid rgba(255,255,255,.22)}
  .btn-s:hover{border-color:#3DBFA3;color:#3DBFA3}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="eyebrow">Erreur 404</div>
  <div class="code">4<em>0</em>4</div>
  <h1>Cette page a changé d'adresse.</h1>
  <p>Le lien que tu suis n'existe pas ou plus. Aucun souci — l'essentiel est resté à sa place.</p>
  <div class="actions">
    <a href="/" class="btn btn-p">← Retour à l'accueil</a>
    <a href="https://wa.me/221763772208" target="_blank" rel="noopener" class="btn btn-s">Me contacter</a>
  </div>
</body>
</html>
