document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er;gap:12px;margin-bottom:clamp(26px,4vw,40px);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\">\n        <span style=\"display:block;width:24px;height:1px;background:#0E0E0E\"><\u002Fspan>Atelier MDG · Kaolack, Sénégal\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:clamp(14px,2vw,24px);margin-bottom:clamp(26px,4vw,40px)\">\n        <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(.58rem,1vw,.72rem);letter-spacing:.42em;text-transform:uppercase;color:#0E0E0E;white-space:nowrap\">Identité<\u002Fspan>\n        <span style=\"flex:1;height:7px;background:repeating-linear-gradient(90deg,#0E0E0E 0 1px,transparent 1px 8px);opacity:.4\"><\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(.58rem,1vw,.72rem);letter-spacing:.42em;text-transform:uppercase;color:#B0ADA8;white-space:nowrap\">Durable<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,7vw,7.5rem);line-height:.96;letter-spacing:-.03em;color:#0E0E0E;margin:0 0 clamp(32px,4vw,44px);max-width:920px\">Des identités<br>qu'on ne<br><em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400;letter-spacing:-.01em\">confond pas.<\u002Fem><\u002Fh1>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n        <p style=\"font-size:1.05rem;font-weight:400;color:#3A3935;line-height:1.65;max-width:480px;margin:0\">Nous façonnons l'image des entreprises qui veulent être prises au sérieux. Logo, web, packaging : un travail pensé pour durer, pas pour suivre la mode.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:16px;flex-shrink:0;flex-wrap:wrap\">\n          <a href=\"#contact\" data-to=\"contact\" onclick=\"{{ nav }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:#0E0E0E;color:#fff;font-size:.82rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:16px 28px;border-radius:100px;text-decoration:none\">Confier votre marque<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <a href=\"#realisations\" data-to=\"realisations\" onclick=\"{{ nav }}\" style=\"font-size:.82rem;font-weight:500;color:#8A8580;text-decoration:none;display:inline-flex;align-items:center;gap:6px\">Voir notre travail<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 5v14M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ scrollHint }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px\">\n        <span style=\"width:1px;height:40px;background:#D0CECA;display:block;animation:scrollPulse 2s ease-in-out infinite;transform-origin:top\"><\u002Fspan>\n        <span style=\"font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\">Scroll<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- SERVICES -->\n  <section id=\"services\" style=\"background:#F5F5F4;padding:clamp(72px,9vw,110px) clamp(20px,5vw,32px)\">\n    <div style=\"max-width:1140px;margin:0 auto;width:100%\">\n      <div data-fade=\"\" style=\"margin-bottom:clamp(44px,6vw,64px)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\"><span style=\"display:block;width:20px;height:1px;background:#0E0E0E\"><\u002Fspan>Ce que nous faisons<\u002Fdiv>\n        <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3.4rem);line-height:1.05;letter-spacing:-.025em;color:#0E0E0E;max-width:700px;margin:0\">Un métier. <em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400\">Quatre disciplines.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px;background:rgba(14,14,14,.1);border:1px solid rgba(14,14,14,.1);border-radius:14px;overflow:hidden\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:2px\">\n          <div data-fade=\"\" style=\"flex:1 1 58%;min-width:300px;background:#fff;padding:clamp(32px,4vw,48px) clamp(28px,3.5vw,44px);display:flex;flex-direction:column;gap:16px\">\n            <span style=\"font-size:.68rem;font-weight:700;letter-spacing:.15em;color:#0E0E0E\">01<\u002Fspan>\n            <div style=\"width:42px;height:42px;border-radius:11px;border:1px solid rgba(14,14,14,.18);display:flex;align-items:center;justify-content:center;color:#0E0E0E\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-.02em;color:#0E0E0E\">Logo &amp; Identité<\u002Fdiv>\n            <p style=\"font-size:.92rem;color:#6A655E;line-height:1.6;max-width:420px;margin:0\">Un logo qui tient aussi bien sur une carte de visite que sur une façade. Une identité qui reste cohérente partout où votre marque apparaît.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:6px\">\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Logo<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Charte graphique<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Brand book<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Déclinaisons<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div data-fade=\"\" style=\"flex:1 1 38%;min-width:260px;background:#fff;padding:clamp(32px,4vw,48px) clamp(28px,3.5vw,44px);display:flex;flex-direction:column;gap:16px\">\n            <span style=\"font-size:.68rem;font-weight:700;letter-spacing:.15em;color:#0E0E0E\">02<\u002Fspan>\n            <div style=\"width:42px;height:42px;border-radius:11px;border:1px solid rgba(14,14,14,.18);display:flex;align-items:center;justify-content:center;color:#0E0E0E\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-.02em;color:#0E0E0E\">Web Design<\u002Fdiv>\n            <p style=\"font-size:.92rem;color:#6A655E;line-height:1.6;max-width:420px;margin:0\">Des sites qui donnent à votre marque le sérieux qu'elle mérite. Sur mesure, pensés mobile d'abord, conçus pour transformer le visiteur en client.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:6px\">\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Site vitrine<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Landing page<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">UI/UX<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:2px\">\n          <div data-fade=\"\" style=\"flex:1 1 38%;min-width:260px;background:#fff;padding:clamp(32px,4vw,48px) clamp(28px,3.5vw,44px);display:flex;flex-direction:column;gap:16px\">\n            <span style=\"font-size:.68rem;font-weight:700;letter-spacing:.15em;color:#0E0E0E\">03<\u002Fspan>\n            <div style=\"width:42px;height:42px;border-radius:11px;border:1px solid rgba(14,14,14,.18);display:flex;align-items:center;justify-content:center;color:#0E0E0E\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-.02em;color:#0E0E0E\">Packaging<\u002Fdiv>\n            <p style=\"font-size:.92rem;color:#6A655E;line-height:1.6;max-width:420px;margin:0\">L'emballage parle avant vous. Nous en faisons le premier argument de votre marque, du rayon jusqu'aux mains du client.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:6px\">\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Étiquettes<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Boîtes<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Print-ready<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div data-fade=\"\" style=\"flex:1 1 58%;min-width:300px;background:#fff;padding:clamp(32px,4vw,48px) clamp(28px,3.5vw,44px);display:flex;flex-direction:column;gap:16px\">\n            <span style=\"font-size:.68rem;font-weight:700;letter-spacing:.15em;color:#0E0E0E\">04<\u002Fspan>\n            <div style=\"width:42px;height:42px;border-radius:11px;border:1px solid rgba(14,14,14,.18);display:flex;align-items:center;justify-content:center;color:#0E0E0E\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M2 20h20M6 20V10l6-6 6 6v10\"><\u002Fpath><path d=\"M10 20v-6h4v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-.02em;color:#0E0E0E\">Stratégie visuelle<\u002Fdiv>\n            <p style=\"font-size:.92rem;color:#6A655E;line-height:1.6;max-width:420px;margin:0\">Avant de dessiner, on réfléchit. Direction artistique, positionnement, cohérence sur chacun de vos points de contact, pour que tout raconte la même histoire.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:6px\">\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Direction artistique<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Moodboard<\u002Fspan>\n              <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3A3935;background:#F5F5F4;border-radius:100px;padding:4px 10px\">Supports com<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RÉALISATIONS -->\n  <section id=\"realisations\" style=\"background:#ffffff;padding:clamp(72px,9vw,110px) clamp(20px,5vw,32px)\">\n    <div style=\"max-width:1140px;margin:0 auto;width:100%\">\n      <div data-fade=\"\" style=\"margin-bottom:clamp(44px,6vw,64px)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\"><span style=\"display:block;width:20px;height:1px;background:#0E0E0E\"><\u002Fspan>Nos réalisations<\u002Fdiv>\n        <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3.4rem);line-height:1.05;letter-spacing:-.025em;color:#0E0E0E;max-width:700px;margin:0\">Du travail <em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400\">concret.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px;background:rgba(14,14,14,.1);border:1px solid rgba(14,14,14,.1);border-radius:14px;overflow:hidden\">\n        <sc-for list=\"{{ projects }}\" as=\"project\" hint-placeholder-count=\"4\">\n          <div data-fade=\"\" data-id=\"{{ project.id }}\" onclick=\"{{ open }}\" role=\"button\" tabindex=\"0\" style=\"background:#fff;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit\">\n            <div style=\"width:100%;aspect-ratio:4/3;overflow:hidden;background:#ffffff;display:flex;align-items:center;justify-content:center;padding:clamp(20px,4%,36px)\">\n              <img src=\"{{ project.thumb }}\" alt=\"{{ project.name }}\" loading=\"lazy\" style=\"max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block\">\n            <\u002Fdiv>\n            <div style=\"padding:28px 28px 32px;display:flex;flex-direction:column;gap:10px;flex:1\">\n              <div style=\"font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#8A8580;display:flex;align-items:center;gap:8px\"><span style=\"display:block;width:14px;height:1px;background:#0E0E0E\"><\u002Fspan>{{ project.cat }}<\u002Fdiv>\n              <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.02em;color:#0E0E0E;line-height:1.1\">{{ project.name }}<\u002Fdiv>\n              <p style=\"font-size:.84rem;color:#6A655E;line-height:1.55;margin:2px 0 0\">{{ project.cardDesc }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"position:absolute;bottom:28px;right:28px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(14,14,14,.18);display:flex;align-items:center;justify-content:center;color:#8A8580\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- POURQUOI -->\n  <section id=\"pourquoi\" style=\"background:#F5F5F4;padding:clamp(72px,9vw,110px) clamp(20px,5vw,32px)\">\n    <div style=\"max-width:1140px;margin:0 auto;width:100%\">\n      <div data-fade=\"\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\"><span style=\"display:block;width:20px;height:1px;background:#0E0E0E\"><\u002Fspan>Notre approche<\u002Fdiv>\n        <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3.4rem);line-height:1.05;letter-spacing:-.025em;color:#0E0E0E;max-width:700px;margin:0\">Pourquoi <em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400\">l'Atelier MDG<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:rgba(14,14,14,.1);border:1px solid rgba(14,14,14,.1);border-radius:14px;overflow:hidden;margin-top:clamp(44px,6vw,64px)\">\n        <div data-fade=\"\" style=\"padding:clamp(36px,4vw,48px) clamp(28px,3vw,36px);background:#fff;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;letter-spacing:-.04em;color:#E8E7E4;line-height:1\">7+<\u002Fdiv>\n          <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:-.015em;color:#0E0E0E\">Sept ans sur le terrain<\u002Fdiv>\n          <p style=\"font-size:.88rem;color:#6A655E;line-height:1.65;margin:0\">Depuis 2019, nous accompagnons des marques et des artistes dans neuf pays. Ce recul se lit dans chaque choix créatif.<\u002Fp>\n        <\u002Fdiv>\n        <div data-fade=\"\" style=\"padding:clamp(36px,4vw,48px) clamp(28px,3vw,36px);background:#fff;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;letter-spacing:-.04em;color:#E8E7E4;line-height:1\">01<\u002Fdiv>\n          <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:-.015em;color:#0E0E0E\">Un seul interlocuteur<\u002Fdiv>\n          <p style=\"font-size:.88rem;color:#6A655E;line-height:1.65;margin:0\">Pas d'intermédiaire. Vous échangez directement avec le directeur créatif, du premier brief jusqu'à la livraison. Clair et réactif.<\u002Fp>\n        <\u002Fdiv>\n        <div data-fade=\"\" style=\"padding:clamp(36px,4vw,48px) clamp(28px,3vw,36px);background:#fff;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;letter-spacing:-.04em;color:#E8E7E4;line-height:1\">∞<\u002Fdiv>\n          <div style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:-.015em;color:#0E0E0E\">Aucun compromis<\u002Fdiv>\n          <p style=\"font-size:.88rem;color:#6A655E;line-height:1.65;margin:0\">Nous ne livrons pas ce qui « passe ». Nous livrons ce qui est juste, chaque projet traité comme s'il s'agissait de notre propre marque.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section id=\"contact\" style=\"background:#0E0E0E;padding:clamp(80px,11vw,120px) clamp(20px,5vw,32px)\">\n    <div style=\"max-width:1140px;margin:0 auto;display:flex;flex-direction:column;align-items:flex-start;gap:clamp(32px,5vw,48px)\">\n      <div style=\"display:flex;align-items:center;gap:10px;font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)\"><span style=\"display:block;width:20px;height:1px;background:rgba(255,255,255,.4)\"><\u002Fspan>La suite vous appartient<\u002Fdiv>\n      <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.4rem,5vw,5rem);line-height:.98;letter-spacing:-.03em;color:#fff;max-width:780px;margin:0\">Donnons à votre marque<br>une image <em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400\">qu'on n'oublie pas.<\u002Fem><\u002Fh2>\n      <div style=\"display:flex;align-items:center;gap:20px;flex-wrap:wrap\">\n        <a href=\"/cdn-cgi/l/email-protection#cba8a4a5bfaaa8bf8ba6afaca8b9aeaabfa2bdaee5b8bfbeafa2a4\" style=\"display:inline-flex;align-items:center;gap:10px;background:#fff;color:#0E0E0E;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:18px 32px;border-radius:100px;text-decoration:none\">Écrire à l'atelier<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n      <p style=\"font-size:.82rem;color:rgba(255,255,255,.4);line-height:1.5;margin:0\">Le brief tient parfois en trois lignes. Envoyez-les, on vous répond avec un vrai point de vue, pas un devis automatique. Aussi sur <a href=\"https://instagram.com/_its.mdg\" target=\"_blank\" rel=\"noopener\" style=\"color:rgba(255,255,255,.65);text-decoration:none\">Instagram<\u002Fa> · <a href=\"https://www.behance.net/itsmdg\" target=\"_blank\" rel=\"noopener\" style=\"color:rgba(255,255,255,.65);text-decoration:none\">Behance<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#0E0E0E;border-top:1px solid rgba(255,255,255,.08);padding:clamp(24px,3vw,32px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px\">\n    <span style=\"font-size:.74rem;color:rgba(255,255,255,.28)\">© 2025 Atelier MDG · Kaolack, Sénégal<\u002Fspan>\n    <a href=\"index.html\" onclick=\"{{ goIndex }}\" style=\"font-size:.74rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;display:flex;align-items:center;gap:8px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M19 12H5M5 12l7-7M5 12l7 7\"><\u002Fpath><\u002Fsvg>Retour MDG Creative<\u002Fa>\n  <\u002Ffooter>\n\n  <!-- MODAL CASE STUDY -->\n  <sc-if value=\"{{ hasModal }}\">\n    <div onclick=\"{{ overlayClick }}\" role=\"dialog\" aria-modal=\"true\" style=\"position:fixed;inset:0;z-index:2000;background:rgba(14,14,14,.62);display:flex;align-items:stretch;justify-content:flex-end\">\n      <div style=\"width:min(820px,100vw);background:#fff;height:100dvh;overflow-y:auto;overscroll-behavior:contain;display:flex;flex-direction:column;position:relative;animation:ateSlideIn .45s cubic-bezier(.4,0,.2,1)\">\n        <div style=\"position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(14,14,14,.1);padding:18px clamp(20px,4vw,32px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n          <div style=\"display:flex;flex-direction:column;gap:2px\">\n            <div style=\"font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#8A8580\">{{ current.cat }}<\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-.02em;color:#0E0E0E\">{{ current.name }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ close }}\" aria-label=\"Fermer\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(14,14,14,.18);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#3A3935;flex-shrink:0\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"width:100%;background:#F5F5F4;flex-shrink:0;aspect-ratio:16/9;overflow:hidden\">\n          <img src=\"{{ current.hero }}\" alt=\"{{ current.name }}\" style=\"width:100%;height:100%;object-fit:cover;display:block\">\n        <\u002Fdiv>\n        <div style=\"padding:clamp(32px,4vw,48px) clamp(24px,4vw,40px) 32px;border-bottom:1px solid rgba(14,14,14,.1)\">\n          <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.03em;line-height:.98;color:#0E0E0E;margin:0 0 20px\"><em style=\"font-family:'DM Serif Display',serif;font-style:italic;font-weight:400\">{{ current.name }}<\u002Fem><\u002Fh2>\n          <p style=\"font-size:.95rem;color:#6A655E;line-height:1.65;max-width:520px;margin:0 0 28px\">{{ current.longDesc }}<\u002Fp>\n          <div style=\"display:flex;gap:40px;flex-wrap:wrap\">\n            <sc-for list=\"{{ current.meta }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;flex-direction:column;gap:4px\">\n                <span style=\"font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#B0ADA8\">{{ m.label }}<\u002Fspan>\n                <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;letter-spacing:-.01em;color:#0E0E0E\">{{ m.val }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(28px,4vw,40px) clamp(24px,4vw,40px) 60px\">\n          <div style=\"font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#8A8580;margin-bottom:28px;display:flex;align-items:center;gap:10px\"><span style=\"display:block;width:16px;height:1px;background:#0E0E0E\"><\u002Fspan>Brand Guidelines<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ current.slides }}\" as=\"slide\" hint-placeholder-count=\"4\">\n              <div style=\"width:100%;border-radius:8px;overflow:hidden;background:#F5F5F4\">\n                <img src=\"{{ slide }}\" alt=\"Brand guidelines\" loading=\"lazy\" style=\"width:100%;height:auto;display:block\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;showHeroTexture&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;scrollHint&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { isMobile: false, mobileOpen: false, openProject: null };\n\n  componentDidMount(){\n    this._onResize = () => {\n      const m = window.innerWidth <= 768;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m });\n    };\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12 });\n    this._observe();\n\n    this._onKey = (e) => { if (e.key === 'Escape') this.closeProject(); };\n    document.addEventListener('keydown', this._onKey);\n  }\n\n  componentDidUpdate(){ this._observe(); }\n\n  _observe(){\n    if (!this._io) return;\n    document.querySelectorAll('[data-fade]:not([data-seen])').forEach(el => {\n      el.setAttribute('data-seen', '');\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      el.style.transition = 'opacity .6s cubic-bezier(.4,0,.2,1), transform .6s cubic-bezier(.4,0,.2,1)';\n      this._io.observe(el);\n    });\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    document.removeEventListener('keydown', this._onKey);\n    if (this._io) this._io.disconnect();\n  }\n\n  scrollToId(id){\n    const el = document.getElementById(id);\n    if (el) {\n      const top = el.getBoundingClientRect().top + window.scrollY - 48;\n      window.scrollTo({ top, behavior: 'smooth' });\n    }\n  }\n\n  openProject(id){\n    document.body.style.overflow = 'hidden';\n    this.setState({ openProject: id, mobileOpen: false });\n  }\n\n  closeProject(){\n    document.body.style.overflow = '';\n    this.setState({ openProject: null });\n  }\n\n  goIndex(e){\n    e.preventDefault();\n    const ov = document.createElement('div');\n    ov.style.cssText = 'position:fixed;inset:0;background:#060606;z-index:9999;opacity:0;transition:opacity .45s cubic-bezier(.4,0,.2,1);pointer-events:all';\n    document.body.appendChild(ov);\n    requestAnimationFrame(() => { ov.style.opacity = '1'; });\n    setTimeout(() => { window.location.href = 'index.html'; }, 480);\n  }\n\n  renderVals(){\n    const base = 'https://res.cloudinary.com/djdkpihuz/image/upload/f_auto,q_auto,';\n    const C = (id) => base + 'w_1200/' + id;\n    const T = (id) => base + 'w_800/' + id;\n    const META = [\n      { label: 'Discipline', val: 'Brand Identity' },\n      { label: 'Livrables', val: 'Logo · Charte · Guidelines' }\n    ];\n    const PROJECTS = [\n      {\n        id: 'baobabs',\n        cat: 'Branding · Logo & Identité',\n        name: 'Baobabs Basket Club',\n        cardDesc: 'Identité visuelle complète pour un club de basketball. Logo, charte graphique, déclinaisons.',\n        longDesc: \"Conception de l'identité visuelle complète d'un club de basketball : du logo principal à la charte graphique, en passant par les déclinaisons et les guidelines.\",\n        thumb: T('v1782735670/BAOBABS_BASKET_CLUB_j9wdmd.png'),\n        hero: C('v1782735670/BAOBABS_BASKET_CLUB_j9wdmd.png'),\n        meta: [META[0], META[1], { label: 'Secteur', val: 'Sport' }],\n        slides: [\n          'v1782735456/Plan_de_travail_1_zo5kn4.png','v1782735450/Plan_de_travail_2_hxsvbf.png',\n          'v1782735452/Plan_de_travail_3_mv887z.png','v1782735532/Plan_de_travail_4_z8arg4.png',\n          'v1782735461/Plan_de_travail_5_aut73t.png','v1782735457/Plan_de_travail_6_dznpfn.png',\n          'v1782735467/Plan_de_travail_7_cz8v8b.png','v1782735475/Plan_de_travail_8_fwsxct.png',\n          'v1782735666/Plan_de_travail_9_bsw1sn.png','v1782735619/Plan_de_travail_10_hidyx9.png',\n          'v1782736229/Plan_de_travail_11_foahki.jpg','v1782736316/Plan_de_travail_12_ha691v.jpg',\n          'v1782735486/Plan_de_travail_13_vkiiip.png'\n        ].map(C)\n      },\n      {\n        id: 'rima',\n        cat: 'Branding · Logo & Identité',\n        name: 'RIMA',\n        cardDesc: 'Identité visuelle pour RIMA. Logo, charte graphique et brand guidelines complets.',\n        longDesc: \"Conception de l'identité visuelle complète de RIMA : du logo principal à la charte graphique et aux brand guidelines.\",\n        thumb: T('v1782739655/RIMA_LOGO_rhv7vf.png'),\n        hero: C('v1782739655/RIMA_LOGO_rhv7vf.png'),\n        meta: META,\n        slides: [\n          'v1782739655/Plan_de_travail_1_pspjx8.png','v1782739669/Plan_de_travail_2_dyls9z.png',\n          'v1782739670/Plan_de_travail_3_vyb4dq.png','v1782739658/Plan_de_travail_4_khzhn1.png',\n          'v1782739711/Plan_de_travail_5_itknh1.png','v1782739659/Plan_de_travail_6_xlli44.png'\n        ].map(C)\n      },\n      {\n        id: 'ovp',\n        cat: 'Branding · Logo & Identité',\n        name: 'OVP Studio',\n        cardDesc: 'Identité visuelle complète pour Owl Vision Production Studio. Logo, charte graphique et brand guidelines.',\n        longDesc: \"Conception de l'identité visuelle complète d'OVP Studio, du logo principal à la charte graphique et aux brand guidelines.\",\n        thumb: T('v1782740145/Plan_de_travail_1_x0tefo.png'),\n        hero: C('v1782740145/Plan_de_travail_1_x0tefo.png'),\n        meta: META,\n        slides: [\n          'v1782740145/Plan_de_travail_1_x0tefo.png','v1782740153/Plan_de_travail_2_gb8p3a.png',\n          'v1782740136/Plan_de_travail_3_xkig0h.png','v1782740100/Plan_de_travail_4_oxwotb.png',\n          'v1782740151/Plan_de_travail_5_uquc9u.png','v1782740211/Plan_de_travail_6_wcflcx.png',\n          'v1782740200/Plan_de_travail_7_mkw8dk.png','v1782740134/Plan_de_travail_8_g8rxpq.png'\n        ].map(C)\n      },\n      {\n        id: 'sinesaloum',\n        cat: 'Branding · Logo & Identité',\n        name: 'Sine Saloum Festival',\n        cardDesc: 'Identité visuelle complète pour le Sine Saloum Festival. Logo, charte graphique et brand guidelines.',\n        longDesc: \"Conception de l'identité visuelle complète du Sine Saloum Festival, du logo principal à la charte graphique et aux brand guidelines.\",\n        thumb: T('v1782742073/SINE_SALOUM_FESTIVAL_mhucop.png'),\n        hero: C('v1782742073/SINE_SALOUM_FESTIVAL_mhucop.png'),\n        meta: META,\n        slides: [\n          'v1782742360/Plan_de_travail_1_gx2njo.png','v1782742357/Plan_de_travail_2_gsghfk.png',\n          'v1782742356/Plan_de_travail_3_r0varw.png','v1782742355/Plan_de_travail_4_gvjlko.png',\n          'v1782742261/Plan_de_travail_5_gmgrce.png','v1782742253/Plan_de_travail_6_knqqr6.png',\n          'v1782742229/Plan_de_travail_7_cdrukc.png','v1782742183/Plan_de_travail_8_bu8jmp.png',\n          'v1782742131/Plan_de_travail_9_hetyx3.png'\n        ].map(C)\n      }\n    ];\n    const cur = PROJECTS.find(p => p.id === this.state.openProject) || null;\n    return {\n      isMobile: this.state.isMobile,\n      isDesktop: !this.state.isMobile,\n      mobileOpen: this.state.mobileOpen,\n      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),\n      showHeroTexture: this.props.showHeroTexture ?? true,\n      scrollHint: this.props.scrollHint ?? true,\n      projects: PROJECTS,\n      current: cur,\n      hasModal: !!cur,\n      open: (e) => this.openProject(e.currentTarget.getAttribute('data-id')),\n      close: () => this.closeProject(),\n      overlayClick: (e) => { if (e.target === e.currentTarget) this.closeProject(); },\n      nav: (e) => { e.preventDefault(); this.scrollToId(e.currentTarget.getAttribute('data-to')); this.setState({ mobileOpen: false }); },\n      goIndex: (e) => this.goIndex(e)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
